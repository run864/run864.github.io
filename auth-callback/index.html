<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conferma email in corso…</title>
  <style>
    :root {
      --background: #F6F9FF; --on-background: #0F1B33; --surface: #FFFFFF;
      --primary: #165DDB; --on-primary: #FFFFFF; --primary-container: #DCE9FF;
      --on-surface-variant: #58657E; --outline: #B5C2D8; --error: #BA1A1A;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --background: #070D18; --on-background: #EAF2FF; --surface: #0D1422;
        --primary: #5FA0FF; --on-primary: #00142E; --primary-container: #103A8A;
        --on-surface-variant: #B7C7E3; --outline: #6F89B2; --error: #FFB4AB;
      }
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, Roboto, "Segoe UI", Arial, sans-serif;
      background: var(--background); color: var(--on-background);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; padding: 24px;
    }
    .card {
      background: var(--surface); border: 1px solid var(--outline);
      border-radius: 20px; padding: 32px 28px; max-width: 340px; width: 100%;
      text-align: center; box-shadow: 0 8px 24px rgba(15, 27, 51, 0.08);
    }
    .spinner {
      width: 40px; height: 40px; margin: 0 auto 20px; border-radius: 50%;
      border: 4px solid var(--primary-container); border-top-color: var(--primary);
      animation: spin 0.9s linear infinite;
    }
    .icon {
      width: 40px; height: 40px; margin: 0 auto 20px; border-radius: 50%;
      background: var(--primary-container); color: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; font-weight: 700;
    }
    .icon.error { background: color-mix(in srgb, var(--error) 20%, var(--surface)); color: var(--error); }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 1.1rem; margin: 0 0 8px; font-weight: 600; }
    p { color: var(--on-surface-variant); margin: 0; font-size: 0.9rem; line-height: 1.4; }
    p.with-button { margin-bottom: 24px; }
    a.button {
      display: inline-block; width: 100%; background: var(--primary); color: var(--on-primary);
      text-decoration: none; font-weight: 600; font-size: 0.95rem; padding: 14px 24px;
      border-radius: 12px; transition: opacity 0.15s ease;
    }
    a.button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card" id="card"></div>
  <script>
    var card = document.getElementById("card");

    // Nessun tentativo di apertura automatica dell'app (niente redirect a
    // schemi custom tipo 864://...): si mostra solo il messaggio di
    // conferma. L'utente può tornare manualmente all'app.
    card.innerHTML =
      '<div class="icon">✓</div>' +
      "<h1>Email confermata</h1>" +
      "<p>Puoi tornare al telefono su cui hai l'app installata: la conferma verrà applicata automaticamente al tuo account.</p>";
  </script>
</body>
</html>
