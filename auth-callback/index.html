<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conferma in corso…</title>
  <style>
    /*
      Colori identici a quelli definiti in ui/theme/Theme.kt (Material 3
      ColorScheme), per far sembrare questa pagina di transizione parte
      della stessa app invece di un sito esterno.
    */
    :root {
      /* LightColorScheme */
      --background: #F6F9FF;
      --on-background: #0F1B33;
      --surface: #FFFFFF;
      --primary: #165DDB;
      --on-primary: #FFFFFF;
      --primary-container: #DCE9FF;
      --on-surface-variant: #58657E;
      --outline: #B5C2D8;
      --error: #BA1A1A;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        /* DarkColorScheme */
        --background: #070D18;
        --on-background: #EAF2FF;
        --surface: #0D1422;
        --primary: #5FA0FF;
        --on-primary: #00142E;
        --primary-container: #103A8A;
        --on-surface-variant: #B7C7E3;
        --outline: #6F89B2;
        --error: #FFB4AB;
      }
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, Roboto, "Segoe UI", Arial, sans-serif;
      background: var(--background);
      color: var(--on-background);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--outline);
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 340px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 24px rgba(15, 27, 51, 0.08);
    }

    .spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 20px;
      border-radius: 50%;
      border: 4px solid var(--primary-container);
      border-top-color: var(--primary);
      animation: spin 0.9s linear infinite;
    }

    .icon {
      width: 40px;
      height: 40px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: var(--primary-container);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 700;
    }

    .icon.error {
      background: color-mix(in srgb, var(--error) 20%, var(--surface));
      color: var(--error);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h1 {
      font-size: 1.1rem;
      margin: 0 0 8px;
      font-weight: 600;
    }

    p {
      color: var(--on-surface-variant);
      margin: 0;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    p.with-button {
      margin-bottom: 24px;
    }

    a.button {
      display: inline-block;
      width: 100%;
      background: var(--primary);
      color: var(--on-primary);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      padding: 14px 24px;
      border-radius: 12px;
      transition: opacity 0.15s ease;
    }

    a.button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <!-- Contenuto inserito dinamicamente dallo script in base al dispositivo -->
  </div>

  <script>
    // Questa pagina è il punto di atterraggio dopo la conferma email/
    // recupero password su Supabase. Il link nell'email può essere aperto
    // da QUALSIASI dispositivo (es. computer), non necessariamente dal
    // telefono su cui è installata l'app. Mostriamo quindi il tentativo
    // di apertura app / pulsante SOLO se il dispositivo corrente è un
    // telefono Android; altrimenti mostriamo solo un messaggio informativo.

    var isAndroid = /Android/i.test(navigator.userAgent);
    var card = document.getElementById("card");

    function showFailureMessage() {
      card.innerHTML =
        '<div class="icon error">!</div>' +
        "<h1>Uhm...</h1>" +
        "<p>Sembrerebbe ci sia un problema con l'apertura dell'app. Per favore, controlla l'esistenza dell'app su questo dispositivo.</p>";
    }

    // Se dopo il tentativo di apertura la pagina resta visibile (invece
    // che finire in background perché l'app si è aperta sopra), assumiamo
    // che l'apertura sia fallita e mostriamo un messaggio d'errore.
    function scheduleFailureCheck(delayMs) {
      var didHide = false;
      function onVisibilityChange() {
        if (document.hidden) {
          didHide = true;
        }
      }
      document.addEventListener("visibilitychange", onVisibilityChange);
      setTimeout(function () {
        document.removeEventListener("visibilitychange", onVisibilityChange);
        if (!didHide) {
          showFailureMessage();
        }
      }, delayMs);
    }

    if (isAndroid) {
      // Raccogliamo i parametri che Supabase aggiunge alla URL, sia come
      // query string sia come frammento (#), e li uniamo: il codice
      // Kotlin dell'app (toAuthParams()) li legge in entrambi i formati.
      var params = new URLSearchParams();

      new URLSearchParams(window.location.search).forEach(function (value, key) {
        params.set(key, value);
      });

      var rawHash = window.location.hash ? window.location.hash.substring(1) : "";
      new URLSearchParams(rawHash).forEach(function (value, key) {
        params.set(key, value);
      });

      var query = params.toString();

      // URI "intent://" (sintassi ufficiale di Chrome/Android per aprire
      // un'app da una pagina web): più affidabile di un semplice link con
      // schema custom, specialmente dopo essere arrivati qui tramite una
      // catena di redirect https (es. dal link-wrapper di Gmail).
      var intentUrl =
        "intent://auth-callback" +
        (query ? "?" + query : "") +
        "#Intent;scheme=864;package=com.example.a864;end";

      card.innerHTML =
        '<div class="spinner"></div>' +
        "<h1>Apertura dell'app…</h1>" +
        '<p class="with-button">Se non si apre automaticamente entro qualche secondo, tocca il pulsante qui sotto.</p>' +
        '<a id="open-app" class="button" href="' + intentUrl + '">Apri l\'app</a>';

      document.getElementById("open-app").addEventListener("click", function () {
        // Il click è un gesto utente reale: lasciamo che la navigazione
        // tramite href avvenga normalmente, ma pianifichiamo comunque il
        // controllo di fallimento nel caso l'app non risulti installata.
        scheduleFailureCheck(1800);
      });

      // Tentativo automatico all'apertura della pagina.
      window.location.href = intentUrl;
      scheduleFailureCheck(1800);
    } else {
      // Computer, iPhone o altro dispositivo diverso dal telefono con
      // l'app: nessun pulsante o tentativo di apertura, solo un messaggio.
      card.innerHTML =
        '<div class="icon">✓</div>' +
        "<h1>Conferma ricevuta</h1>" +
        "<p>Puoi tornare al telefono su cui hai l'app installata: la conferma verrà applicata automaticamente al tuo account.</p>";
    }
  </script>
</body>
</html>
